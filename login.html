<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Caixa — Acesso</title>
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>

    <div class="login-page">

        <div class="login-card">

            <div class="login-brand">
                <span class="brand-icon">💰</span>
                <span class="brand-name">Controle de Caixa</span>
            </div>

            <!-- ABAS -->
            <div class="tabs">
                <button class="tab active" id="tab-login" onclick="mostrarAba('login')">Entrar</button>
                <button class="tab" id="tab-registro" onclick="mostrarAba('registro')">Criar Conta</button>
            </div>

            <!-- PAINEL LOGIN -->
            <div id="painel-login" class="painel">
                <p id="msg-login" class="msg"></p>
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="login-usuario" placeholder="Digite seu usuário" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="login-senha" placeholder="Digite sua senha" autocomplete="current-password">
                </div>
                <button class="btn-primary" onclick="fazerLogin()">Entrar</button>
            </div>

            <!-- PAINEL REGISTRO -->
            <div id="painel-registro" class="painel" style="display:none;">
                <p id="msg-registro" class="msg"></p>
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="reg-usuario" placeholder="Escolha um usuário" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="reg-senha" placeholder="Crie uma senha" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Confirmar Senha</label>
                    <input type="password" id="reg-confirma" placeholder="Repita a senha" autocomplete="new-password">
                </div>
                <button class="btn-primary" onclick="fazerRegistro()">Criar Conta</button>
            </div>

        </div>

    </div>

    <script src="assets/js/login.js"></script>
</body>
</html>
